server:
  port: 8080

cors:
  allowed-origins: https://www.lizhiheyue.com

spring:
  application:
    name: pickup-system

  datasource:
    url: jdbc:mysql://localhost:3306/pickup_system_prod?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000